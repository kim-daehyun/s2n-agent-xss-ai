# S2N-Agent LoRA 학습 설정 — Qwen2.5-Coder 7B (실전용)
#
# 실행:
#   python3 scripts/train.py --config configs/lora_7b.yaml
#   python3 scripts/train.py --config configs/lora_7b.yaml --epochs 3
#
# 요구 메모리: ~12GB (4-bit 양자화 + LoRA + grad_checkpoint)
# → M1 Mac Mini 16GB 이상 권장

# ── 모델 ──────────────────────────────────────────────────────────────────────
model: "mlx-community/Qwen2.5-Coder-7B-Instruct-4bit"

# ── 데이터 ────────────────────────────────────────────────────────────────────
data: "data"
train: true

# ── LoRA 하이퍼파라미터 ────────────────────────────────────────────────────────
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

lora_layers:
  - "q_proj"
  - "v_proj"
  - "k_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"

# ── 학습 설정 ─────────────────────────────────────────────────────────────────
# 7B는 32층 → 상위 1/3만 학습 (메모리 + 과적합 방지 균형)
num_layers: 12
batch_size: 2           # 7B는 배치 2로 메모리 확보
grad_checkpoint: true

# ── LR 스케줄 ─────────────────────────────────────────────────────────────────
learning_rate: 1.0e-4
lr_schedule:
  name: cosine_decay
  warmup: 100
  arguments: [5.0e-6, 2400]   # [min_lr, decay_steps]

# ── 반복 횟수 ─────────────────────────────────────────────────────────────────
# 3200 / batch 2 = 1600 steps/epoch → 3 epoch = 4800 → 여유있게 설정
# early stopping이 실제 최적점에서 멈춰줌
iters: 4800
steps_per_eval: 200
val_batches: 25
save_every: 400

# ── 출력 ──────────────────────────────────────────────────────────────────────
adapter_path: "lora-out/7b"

# ── 시퀀스 길이 ───────────────────────────────────────────────────────────────
max_seq_length: 512

# ── 기타 ──────────────────────────────────────────────────────────────────────
seed: 42
