# S2N-Agent LoRA 학습 설정 — Qwen2.5-Coder 7B (실전용)
#
# 실행:
#   python3 scripts/train.py --config configs/lora_7b.yaml
#   python3 -m mlx_lm lora --config configs/lora_7b.yaml
#
# 요구 메모리: ~14GB (4-bit 양자화 기준) — M1 16GB 이상 권장, M3 Pro/Max 최적

# ── 모델 ──────────────────────────────────────────────────────────────────────
model: "mlx-community/Qwen2.5-Coder-7B-Instruct-4bit"

# ── 데이터 ────────────────────────────────────────────────────────────────────
data: "data"
train: true

# ── LoRA 하이퍼파라미터 ────────────────────────────────────────────────────────
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

lora_layers:
  - "q_proj"
  - "v_proj"
  - "k_proj"
  - "o_proj"
  - "gate_proj"         # 7B는 MLP gate도 포함하면 성능 향상
  - "up_proj"

# ── 학습 설정 ─────────────────────────────────────────────────────────────────
num_layers: 28          # 7B는 28~32층 — 절반 참여
batch_size: 2           # 7B는 배치 줄여 메모리 확보
grad_checkpoint: true
learning_rate: 5.0e-5   # 7B는 더 낮은 LR 권장
# lr_schedule: mlx-lm은 문자열이 아닌 dict를 기대함.
# cosine decay가 필요하면 아래 형식 사용:
# lr_schedule:
#   name: cosine_decay
#   warmup: 100
#   arguments: [5.0e-6, 3200]  # [min_lr, decay_steps]

# 3200 / 2 = 1600 steps/epoch → 2 epoch = 3200 iters
iters: 3200
val_batches: 25
save_every: 400

# ── 출력 ──────────────────────────────────────────────────────────────────────
adapter_path: "lora-out/7b"

# ── 시퀀스 길이 ───────────────────────────────────────────────────────────────
max_seq_length: 512

# ── 기타 ──────────────────────────────────────────────────────────────────────
seed: 42
